<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" href="assets/img/icon.png">
                    
    <link rel="stylesheet" href="assets/styles.css">

    <title>Environment & Human Health</title>
</head>
<body>
    <!-- Heading -->
    <div class="heading">
        <h1>Computer Technologies Effects on Environment & Human Health</h1>
    </div>

    <!-- Navbar -->
    <nav class="nav-bar">
        <div class="nav-item">
            <button class="nav-parent">Negative Effects of Computer Tech</button>
            <div class="nav-dropdown">
                <button class="nav-child" id="1" onclick="display(this);">Negative Environmental Effects of Computer Technologies</button>
                <button class="nav-child" id="2" onclick="display(this);">Negative Human Health Effects of Computer Technologies</button>
            </div>
        </div>
 
        <div class="nav-item">
            <button class="nav-parent">Mitigation of Computer Tech Impacts</button>
            <div class="nav-dropdown">
                <button class="nav-child" id="3" onclick="display(this);">Computer Use Policy Mitigating Environmental Impact</button>
                <button class="nav-child" id="4" onclick="display(this);">Computer Use Policy Mitigating Human Health Impact</button>
                <button class="nav-child" id="5" onclick="display(this);">External Resources Mitigating Computer Technologies Impacts</button>
            </div>
        </div>
 
        <div class="nav-item">
            <button class="nav-parent">Positive Effects of Computer Tech</button>
            <div class="nav-dropdown">
                <button class="nav-child" id="6" onclick="display(this);">Computer Technologies Reducing Resource Usage</button>
            </div>
        </div>
    </nav>
 
    <!-- Info nothing burger -->
    <div class="info-container">
        <h2 id="info-heading"></h2>
        <div class="info-section">
            <h3 id="section-heading"></h3>
            <p id="section-body"></p>
        </div>
        <div class="section-nav">
            <button id="btn-prev" class="section-nav-btn" onclick="prevSection();">← Prev</button>
            <button id="btn-next" class="section-nav-btn" onclick="nextSection();">Next →</button>
        </div>
    </div>

    <script src="assets/script/dropdown.js"></script>
    <script src="assets/script/info.js"></script>
