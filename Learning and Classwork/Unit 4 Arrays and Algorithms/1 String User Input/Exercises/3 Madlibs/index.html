<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="assets/styles.css">

    <title>MadLibs</title>
</head>
<body>
    <div class="input-field">
        <label for="ipt-name">First Name:</label>
        <input id="ipt-name">
    </div>

    <div class="input-field">
        <label for="ipt-secret">Deepest, darkest secret:</label>
        <textarea id="ipt-secret"></textarea>
    </div>
    <div class="input-field">
        <label for="ipt-fav">Favorite thing:</label>
        <textarea id="ipt-fav"></textarea>
    </div>

    <button onclick="submit()">Submit</button>

    <div id="output-field">
        <p id="p-output"></p>
    </div>

    <script src="assets/main.js"></script>
</body>
</html>
