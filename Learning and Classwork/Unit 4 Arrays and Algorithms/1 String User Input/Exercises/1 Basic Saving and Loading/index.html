<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="assets/styles.css">

    <title>Basic Saving and Loading</title>
</head>
<body>
    <!-- 
    2 Text input fields, 2 Labels, and 2 Buttons.
    The 2 Text input fields allow you to input the user’s age and the user’s name.
    The 2 Labels are used as prompts for the Text input fields.
    Use global constants for the textboxes.
    One Button is a “Save” button. When the button is pressed, the data in the text input fields are saved into
    2 different variables, and the text input fields are cleared.
    When the user clicks the other “Load” Button, print out the saved user’s name and age in a paragraph.
    -->
    <div class="input-field">
        <label for="ipt-name">Input your name:</label>
        <input id="ipt-name">
    </div>

    <div class="input-field">
        <label for="ipt-age">Input your age:</label>
        <input id="ipt-age">
    </div>
    <button id="btn-save" onclick="save()">Save</button>
    <button id="btn-load" onclick="load()">Load</button>

    <p id="p-load"></p>

    <script src="assets/main.js"></script>
</body>
</html>
