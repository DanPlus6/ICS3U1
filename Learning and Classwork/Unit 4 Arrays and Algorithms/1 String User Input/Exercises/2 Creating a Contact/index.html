<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="assets/styles.css">

    <title>Creating a Contact</title>
</head>
<body>
    <div class="input-field">
        <label for="ipt-fname">First Name:</label>
        <input id="ipt-fname">
    </div>
    <div class="input-field">
        <label for="ipt-lname">Last Name:</label>
        <input id="ipt-lname">
    </div>
        <div class="input-field">
        <label for="ipt-nick">Nickname:</label>
        <input id="ipt-nick">
    </div>

    <div class="input-field">
        <label for="ipt-age">Age:</label>
        <input id="ipt-age">
    </div>
    <div class="input-field">
        <label for="ipt-address">Address</label>
        <input id="ipt-address">
    </div>

    <div class="input-field">
        <label for="ipt-phone">Phone Number:</label>
        <input id="ipt-phone">
    </div>
        <div class="input-field">
        <label for="ipt-email">Email Address:</label>
        <input id="ipt-email">
    </div>

    <div class="input-field">
        <label for="ipt-notes">Notes:</label>
        <textarea id="ipt-notes">
    </div>

    <button id="btn-save" onclick="save()">Save Contact</button>
    <button id="btn-load" onclick="load()">Load Contact</button>


    <script src="assets/main.js"></script>
</body>
</html>
