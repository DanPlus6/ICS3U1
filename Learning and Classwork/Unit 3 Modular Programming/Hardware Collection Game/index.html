<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gaem</title>

    <link rel="icon" type="image/x-icon" href="assets/img/samsung_smart_fridge.ico">
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
    <div class="controls-panel">
        <h3>Controls</h3>
        <p>W / ⬆ — Move Up</p>
        <p>S / ⬇ — Move Down</p>
        <p>A / ⬅ — Move Left</p>
        <p>D / 🡆 — Move Right</p>
        <br>
        <p>Space — Pause/Resume</p>
        <p>R — Reset Game</p>
    </div>
    <div class="misc-controls-panel">
        <h3>Misc Controls</h3>
        <p>B — Do a Barrel Roll</p>
        <p>End — DO NOT PRESS</p>
    </div>

    <div class="game-area">
        <div class="gameclock">
            <h2 id="h-gameclock">0s</h2>
            <button id="btn-toggle-clock">Start</button>
            <button id="btn-reset-clock">Reset</button>
        </div>

        <canvas id="game-canvas">
            Graphics not supported, please enable javascript
        </canvas>

        <div class="game-text-display">
            <p id="text-ln1"></p>
            <p id="text-ln2"></p>
            <p id="text-ln3"></p>
            <small id="text-flavor"></small>
        </div>
    </div>


    <script type="module" src="assets/script/main.js"></script>
</body>
</html>
